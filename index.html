<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>מקומי · אדוות</title>
<link rel="icon" type="image/png" href="advot-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f0f0;
    --card: #ffffff;
    --ink: #0a1330;
    --blue: #0046ff;
    --advot: #2882f0;
    --sky: #0fb4f5;
    --turq: #23d7cd;
    --purple: #6437eb;
    --soft: #5b6478;
    --line: #dde1ea;
    --tint: #e9f0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Rubik', -apple-system, 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    line-height: 1.55;
  }
  #app { max-width: 640px; margin: 0 auto; padding: 0 18px 108px; }

  h1 { font-size: clamp(3rem, 14vw, 4.2rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; color: var(--blue); }
  h2 { font-size: clamp(1.6rem, 7.5vw, 2.1rem); font-weight: 800; line-height: 1.15; }
  .kicker { font-weight: 600; font-size: 0.92rem; color: var(--advot); }
  .soft { color: var(--soft); }

  .brandbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 2px 0; }
  .brandbar img { height: 34px; display: block; }

  /* ===== surfaces ===== */
  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: 0 1px 3px rgba(10,19,48,0.06);
  }

  /* ===== buttons & inputs ===== */
  button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn {
    display: block; width: 100%; padding: 14px 22px;
    background: var(--blue); color: #fff;
    border: 0; border-radius: 999px;
    font-size: 1.1rem; font-weight: 600;
    transition: transform 0.1s, filter 0.15s;
  }
  .btn:active { transform: scale(0.98); filter: brightness(0.92); }
  .btn.advot { background: var(--advot); }
  .btn.turq { background: var(--turq); color: var(--ink); }
  .btn.outline { background: var(--card); color: var(--blue); border: 1.5px solid var(--blue); }
  .btn.quiet { background: var(--card); color: var(--soft); border: 1px solid var(--line); font-weight: 500; font-size: 0.98rem; }
  .btn + .btn { margin-top: 12px; }
  input[type="text"], input[type="tel"], textarea {
    width: 100%; padding: 13px 16px; font: inherit; font-size: 1.05rem;
    background: var(--card); color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 14px; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--advot); box-shadow: 0 0 0 3px rgba(40,130,240,0.15); }
  textarea { resize: vertical; min-height: 150px; }
  label { display: block; font-weight: 600; margin: 22px 0 8px; }
  .hint { font-size: 0.88rem; color: var(--soft); margin-top: 6px; }
  .counter { text-align: left; font-size: 0.8rem; color: var(--soft); margin-top: 4px; }

  /* ===== join ===== */
  .join { padding-top: 5dvh; text-align: center; }
  .join .logo { height: 64px; margin: 0 auto 18px; display: block; }
  .join .chip {
    display: inline-block; margin-top: 10px; padding: 5px 18px;
    background: var(--tint); color: var(--blue); border: 1px solid rgba(0,70,255,0.25);
    border-radius: 999px; font-weight: 600; font-size: 1rem;
  }
  .join .intro { margin-top: 20px; font-size: 1.05rem; }
  .join form { margin-top: 26px; text-align: right; padding: 22px; }
  .join form label { margin-top: 0; }
  .join .btn { margin-top: 18px; }

  /* ===== nav ===== */
  nav {
    position: fixed; bottom: 0; right: 0; left: 0; z-index: 20;
    background: var(--card); border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav .wrap { display: flex; gap: 6px; width: 100%; max-width: 640px; margin: 0 auto; padding: 10px 12px; }
  nav button {
    flex: 1; background: none; border: 0; border-radius: 999px;
    color: var(--soft); padding: 10px 4px; font-size: 0.98rem; font-weight: 600;
  }
  nav button.on { background: var(--tint); color: var(--blue); }

  /* ===== screens ===== */
  .screen { display: none; padding-top: 20px; }
  .screen.on { display: block; animation: rise 0.25s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }

  /* ===== progress ===== */
  .bar-wrap { margin: 0 0 18px; }
  .bar-label { display: flex; justify-content: space-between; font-weight: 600; font-size: 0.92rem; margin-bottom: 6px; color: var(--soft); }
  .bar-label b { color: var(--ink); }
  .bar { height: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .bar .fill { height: 100%; background: var(--advot); border-radius: 999px; transition: width 0.5s ease; }

  /* ===== cards ===== */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .gcard {
    border: 1px solid var(--line); border-radius: 18px; overflow: hidden;
    background: var(--card); box-shadow: 0 1px 3px rgba(10,19,48,0.06);
    cursor: pointer; text-align: right; padding: 0;
    display: flex; flex-direction: column;
    transition: transform 0.12s, box-shadow 0.12s;
    animation: flipin 0.45s ease backwards;
  }
  .gcard:active { transform: scale(0.98); }
  @keyframes flipin { from { opacity: 0; transform: perspective(700px) rotateY(60deg); } to { opacity: 1; transform: none; } }
  .gcard .img { aspect-ratio: 4/3; background-size: cover; background-position: center; border-bottom: 1px solid var(--line); }
  .gcard .blockimg { aspect-ratio: 4/3; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
  .gcard .body { padding: 10px 12px 12px; }
  .gcard .title { font-weight: 800; font-size: 1.02rem; line-height: 1.25; display: block; }
  .tag {
    display: inline-block; margin-top: 8px; font-size: 0.78rem; font-weight: 600;
    padding: 3px 12px; border-radius: 999px;
  }
  .tag.mine { background: var(--card); color: var(--blue); border: 1.5px solid var(--blue); }
  .tag.done { background: var(--turq); color: var(--ink); }
  .tag.todo { background: var(--blue); color: #fff; }
  .tag.author { background: var(--advot); color: #fff; }

  /* ===== face-down deck ===== */
  .deck-scene { text-align: center; padding: 20px 0 10px; }
  .deck { position: relative; width: 200px; height: 260px; margin: 22px auto 26px; }
  .cardback {
    position: absolute; inset: 0; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
  }
  .deck .cardback:nth-child(1) { transform: rotate(-7deg); background: var(--tint); }
  .deck .cardback:nth-child(2) { transform: rotate(5deg); background: #e6fbf9; }
  .deck .cardback:nth-child(3) { background: var(--card); box-shadow: 0 10px 24px rgba(10,19,48,0.12); animation: bob 2.6s ease-in-out infinite; }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .bignum { font-size: 3.2rem; font-weight: 800; line-height: 1.1; color: var(--blue); }

  /* ===== overlay ===== */
  .overlay { position: fixed; inset: 0; z-index: 30; background: var(--bg); overflow-y: auto; display: none; }
  .overlay.on { display: block; animation: rise 0.2s ease; }
  .overlay .inner { max-width: 640px; margin: 0 auto; padding: 14px 18px 60px; }
  .overlay .top { display: flex; justify-content: flex-end; }
  .overlay .hero { border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 1px 3px rgba(10,19,48,0.06); aspect-ratio: 16/10; background-size: cover; background-position: center; margin: 10px 0 20px; }
  .overlay .hero.blockimg { display: flex; align-items: center; justify-content: center; }
  .overlay .story { font-size: 1.12rem; margin-top: 14px; white-space: pre-wrap; }
  .close-x { background: var(--card); border: 1px solid var(--line); border-radius: 999px; font-weight: 600; padding: 8px 18px; color: var(--soft); }
  .guess-list { margin-top: 12px; display: grid; gap: 8px; }
  .guess-list button {
    text-align: right; padding: 12px 18px; background: var(--card);
    border: 1.5px solid var(--line); border-radius: 999px; font-size: 1rem; font-weight: 500;
  }
  .guess-list button.picked { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

  /* ===== reveal ===== */
  .stat-hero {
    border-radius: 20px; padding: 26px 22px; color: #fff; background: var(--blue);
    margin-bottom: 14px;
  }
  .stat-hero .big { font-size: 3.2rem; font-weight: 800; line-height: 1.1; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .stat { border: 1px solid var(--line); border-radius: 18px; padding: 14px 16px; background: var(--card); }
  .stat .n { font-size: 1.8rem; font-weight: 800; color: var(--blue); }
  .stat .t { font-size: 0.85rem; color: var(--soft); font-weight: 600; }
  .stat.wide { margin-bottom: 14px; }
  .stat .name { font-weight: 800; font-size: 1.15rem; }

  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 40; overflow: hidden; }
  .confetti i { position: absolute; top: -4vh; width: 10px; height: 16px; border-radius: 3px; animation: fall 3.2s ease-in forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; } }

  /* ===== admin ===== */
  .admin-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .admin-head img { height: 30px; }
  .phases { display: flex; gap: 8px; margin: 18px 0 8px; }
  .phase-pill {
    flex: 1; text-align: center; padding: 10px 6px; border-radius: 14px;
    border: 1px solid var(--line); background: var(--card); color: var(--soft);
    font-size: 0.85rem; font-weight: 600; line-height: 1.3;
  }
  .phase-pill.now { background: var(--blue); border-color: var(--blue); color: #fff; }
  .phase-pill.past { border-color: var(--turq); color: var(--turq); }
  .whatnow { padding: 14px 18px; margin: 10px 0 16px; font-size: 0.95rem; }
  .whatnow b { color: var(--blue); }
  .chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .chip-stat { text-align: center; border: 1px solid var(--line); border-radius: 16px; background: var(--card); padding: 10px 6px; }
  .chip-stat .n { font-size: 1.6rem; font-weight: 800; color: var(--blue); line-height: 1.2; }
  .chip-stat .t { font-size: 0.78rem; color: var(--soft); font-weight: 600; }
  .missing { padding: 14px 18px; margin-bottom: 16px; }
  .missing .names { color: var(--soft); font-size: 0.95rem; margin: 6px 0 10px; }
  .copybtn { background: var(--tint); color: var(--blue); border: 0; border-radius: 999px; padding: 8px 18px; font-weight: 600; font-size: 0.9rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  td, th { padding: 9px 6px; border-bottom: 1px solid var(--line); text-align: right; font-size: 0.93rem; }
  th { color: var(--soft); font-size: 0.8rem; font-weight: 600; }
  .yes { color: var(--turq); font-weight: 800; }
  .no { color: var(--advot); font-weight: 800; }
  .del { background: none; border: 0; color: var(--soft); font-size: 1rem; padding: 4px 8px; }
  .del:active { color: #d33; }
  details.mod { margin-top: 18px; border: 1px solid var(--line); border-radius: 16px; background: var(--card); padding: 0 16px; }
  details.mod summary { padding: 14px 0; font-weight: 600; cursor: pointer; color: var(--blue); list-style-position: inside; }
  .modcard { display: flex; gap: 12px; padding: 12px 0; border-top: 1px solid var(--line); }
  .modcard .thumb { width: 72px; height: 54px; border-radius: 10px; background: var(--tint); background-size: cover; background-position: center; flex: none; display: flex; align-items: center; justify-content: center; }
  .modcard .who { font-size: 0.82rem; color: var(--advot); font-weight: 600; }
  .modcard .ttl { font-weight: 800; font-size: 0.98rem; }
  .modcard .snip { font-size: 0.85rem; color: var(--soft); }
  .admin-actions { margin: 4px 0 18px; }
  .autorefresh { text-align: center; font-size: 0.8rem; color: var(--soft); margin-top: 14px; }

  /* ===== toast ===== */
  #toast {
    position: fixed; bottom: 92px; right: 50%; transform: translateX(50%);
    background: var(--ink); color: #fff; padding: 12px 24px;
    border-radius: 999px; font-weight: 600; z-index: 50; display: none; max-width: 90vw; text-align: center;
    box-shadow: 0 6px 18px rgba(10,19,48,0.25);
  }
  #toast.on { display: block; animation: rise 0.2s ease; }
  #toast.err { background: var(--advot); }

  .success-note {
    background: var(--tint); color: var(--blue); border: 1px solid rgba(0,70,255,0.25);
    border-radius: 16px; padding: 13px 18px; font-weight: 600; margin-top: 18px;
  }
  .success-note.warm { background: #e6fbf9; color: #0b7a72; border-color: rgba(35,215,205,0.5); }
  .waiting { text-align: center; padding: 36px 0; }
  .imgpick { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .imgpick .preview { width: 88px; height: 66px; border-radius: 12px; background: var(--tint); background-size: cover; background-position: center; border: 1px solid var(--line); flex: none; }
  .imgpick .btn { width: auto; margin: 0; padding: 9px 18px; font-size: 0.95rem; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
"use strict";

/* ===== חיבור ===== */
const SB_URL = "https://ndrhiikczkbosentclnh.supabase.co";
const SB_KEY = "sb_publishable_EckoZz1eIoRjjjQ9XhXhzA_EpuKVWQG";
const HEADERS = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" };

async function rpc(fn, args) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, { method: "POST", headers: HEADERS, body: JSON.stringify(args) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || "network"); }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}
async function get(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: HEADERS });
  if (!r.ok) throw new Error("network");
  return r.json();
}

/* ===== מצב מקומי ===== */
const store = {
  get id() { return localStorage.getItem("mekomi_id"); },
  set id(v) { localStorage.setItem("mekomi_id", v); },
  get name() { return localStorage.getItem("mekomi_name"); },
  set name(v) { localStorage.setItem("mekomi_name", v); },
  get mine() { try { return JSON.parse(localStorage.getItem("mekomi_mine")); } catch { return null; } },
  set mine(v) { localStorage.setItem("mekomi_mine", JSON.stringify(v)); },
  get draft() { try { return JSON.parse(localStorage.getItem("mekomi_draft")) || {}; } catch { return {}; } },
  set draft(v) { localStorage.setItem("mekomi_draft", JSON.stringify(v)); },
  get adminPin() { return localStorage.getItem("mekomi_admin_pin"); },
  set adminPin(v) { localStorage.setItem("mekomi_admin_pin", v); }
};

const state = {
  phase: "submitting",
  placesCount: 0,
  participantsCount: 0,
  participants: [],
  places: [],
  guesses: [],
  allGuesses: [],
  tab: "mine",
  pendingImage: null,
  admin: null,
  adminTimer: null
};

/* ===== עזרים ===== */
const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const CARD_COLORS = ["#2882f0", "#0fb4f5", "#23d7cd", "#6437eb", "#0046ff"];
const colorFor = id => CARD_COLORS[[...id].reduce((a, c) => a + c.charCodeAt(0), 0) % CARD_COLORS.length];
const nameOf = id => state.participants.find(x => x.id === id)?.name || "";
const isMine = p => (state.phase === "revealed" && p.author_id) ? p.author_id === store.id : p.id === store.mine?.id;
const LOGO = `<img src="advot-logo.png" alt="אדוות">`;

function toast(msg, err) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "on" + (err ? " err" : "");
  clearTimeout(t._h);
  t._h = setTimeout(() => t.className = "", 2600);
}

/* אדוות משולשות, על פי הצורניות של אדוות */
function rippleTri(size, color, rings) {
  const c = color || "#2882f0";
  const n = rings || 4;
  const tri = "M 30,25 L 70,25 Q 82,25 76,35 L 56,70 Q 50,80 44,70 L 24,35 Q 18,25 30,25 Z";
  let paths = "";
  for (let i = 0; i < n; i++) {
    const s = 1 - i * (0.82 / n);
    const op = 1 - i * (0.6 / n);
    paths += `<g transform="translate(50 51) scale(${s.toFixed(3)}) translate(-50 -51)">
      <path d="${tri}" fill="none" stroke="${c}" stroke-width="${(2.4 / s).toFixed(2)}" opacity="${op.toFixed(2)}"/></g>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" aria-hidden="true">${paths}</svg>`;
}

function confetti() {
  const colors = ["#0046ff", "#2882f0", "#0fb4f5", "#23d7cd", "#6437eb"];
  const box = document.createElement("div");
  box.className = "confetti";
  for (let i = 0; i < 28; i++) {
    const p = document.createElement("i");
    p.style.right = Math.random() * 100 + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random() * 0.9) + "s";
    p.style.animationDuration = (2.4 + Math.random() * 1.6) + "s";
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 5200);
}

/* ===== טעינת נתונים ===== */
async function refresh() {
  const [st, parts, places] = await Promise.all([
    get("mekomi_state?select=*"),
    get("mekomi_participants_public?select=id,name&order=name"),
    get("mekomi_places_public?select=*&order=updated_at.desc")
  ]);
  state.phase = st[0]?.phase || "submitting";
  state.placesCount = st[0]?.places_count ?? 0;
  state.participantsCount = st[0]?.participants_count ?? 0;
  state.participants = parts;
  state.places = places;
  if (store.id) {
    state.guesses = await get(`mekomi_guesses?select=place_id,guessed_author_id&guesser_id=eq.${store.id}`);
  }
  if (state.phase === "revealed") {
    state.allGuesses = await get("mekomi_guesses?select=guesser_id,place_id,guessed_author_id");
  }
}

/* ===== ניתוב ===== */
function isAdminRoute() { return location.hash.startsWith("#admin"); }

function render() {
  if (!isAdminRoute() && state.adminTimer) { clearInterval(state.adminTimer); state.adminTimer = null; }
  if (isAdminRoute()) return renderAdmin();
  if (!store.id) return renderJoin();
  renderMain();
}

/* ===== כניסה ===== */
function renderJoin() {
  $("#app").innerHTML = `
    <div class="join">
      <div style="margin-bottom:6px">${rippleTri(84)}</div>
      <img class="logo" src="advot-logo.png" alt="אדוות — מנהיגות מחוללת שינוי">
      <h1>מקומי</h1>
      <span class="chip">משנה מקום, מקום משני</span>
      <p class="intro">לכל אחת ואחד יש מקום שהוא חלק ממי שהם.<br>ננסה לגלות של מי כל מקום. מוכנים?</p>
      <form id="joinForm" class="panel">
        <label for="jname">איך קוראים לך?</label>
        <input type="text" id="jname" autocomplete="name" placeholder="שם פרטי ומשפחה" maxlength="60" required>
        <button class="btn" type="submit">נכנסים למשחק</button>
      </form>
    </div>`;
  $("#joinForm").onsubmit = async e => {
    e.preventDefault();
    const name = $("#jname").value.trim();
    if (name.length < 2) return toast("צריך שם, שנדע מי כאן", true);
    try {
      const id = await rpc("mekomi_join", { p_name: name });
      store.id = id; store.name = name;
      state.tab = "mine";
      await refresh(); render();
      toast("ברוכים הבאים. עכשיו המקום שלך");
    } catch { toast("אין קליטה כרגע. נסו שוב עוד רגע", true); }
  };
}

/* ===== מסך ראשי ===== */
function renderMain() {
  const tabs = [["mine", "המקום שלי"], ["cards", "הקלפים"], ["reveal", "החשיפה"]];
  $("#app").innerHTML = `
    <div class="brandbar">${LOGO}<span class="kicker">מקומי · משנה מקום, מקום משני</span></div>
    <div class="screen on" id="screen"></div>
    <nav><div class="wrap">
      ${tabs.map(([k, t]) => `<button data-tab="${k}" class="${state.tab === k ? "on" : ""}">${t}</button>`).join("")}
    </div></nav>
    <div class="overlay" id="overlay"></div>`;
  document.querySelectorAll("nav button").forEach(b => b.onclick = async () => {
    state.tab = b.dataset.tab;
    try { await refresh(); } catch {}
    render();
  });
  if (state.tab === "mine") renderMine();
  if (state.tab === "cards") renderCards();
  if (state.tab === "reveal") renderReveal();
}

/* ----- המקום שלי ----- */
function renderMine() {
  const mine = store.mine;
  const d = store.draft;
  const locked = state.phase === "revealed";
  $("#screen").innerHTML = `
    <p class="kicker">שלום, ${esc(store.name)}</p>
    <h2>המקום שלך</h2>
    <p class="soft" style="margin-top:8px">מקום שאת או אתה מרגישים אליו שייכות. לא חייב להיות מקום פיזי.</p>
    ${mine && !locked ? `<div class="success-note warm">הקלף שלך במשחק. אפשר לערוך עד חשיפת השמות.</div>` : ""}
    ${locked ? `<div class="success-note">השמות נחשפו והמשחק הסתיים. תודה ששיחקתם.</div>` : ""}
    <form id="placeForm" ${locked ? "style='opacity:0.55;pointer-events:none'" : ""}>
      <label for="ptitle">שם המקום</label>
      <input type="text" id="ptitle" maxlength="80" placeholder="למשל: הסלע שמול הים" value="${esc(d.title ?? mine?.title ?? "")}">
      <label for="pstory">מה המקום הזה בשבילך?</label>
      <textarea id="pstory" maxlength="600" placeholder="הסיפור שהופך את המקום הזה לשלך">${esc(d.story ?? mine?.story ?? "")}</textarea>
      <div class="counter"><span id="cnt">0</span>/600</div>
      <label>תמונה (לא חובה)</label>
      <div class="imgpick">
        <div class="preview" id="imgPrev" ${mine?.image_url ? `style="background-image:url('${esc(mine.image_url)}')"` : ""}></div>
        <button type="button" class="btn outline" id="imgBtn">בחירת תמונה</button>
        <input type="file" id="imgFile" accept="image/*" hidden>
      </div>
      <p class="hint">בלי תמונה שלך או של המשפחה. תנו למקום לרמוז, לא לגלות.</p>
      <button class="btn" type="submit" style="margin-top:26px">${mine ? "שומרים שינויים" : "שולחים את הקלף"}</button>
    </form>`;
  const story = $("#pstory"), cnt = $("#cnt");
  const updCnt = () => cnt.textContent = story.value.length;
  updCnt();
  const saveDraft = () => store.draft = { title: $("#ptitle").value, story: story.value };
  story.oninput = () => { updCnt(); saveDraft(); };
  $("#ptitle").oninput = saveDraft;
  $("#imgBtn").onclick = () => $("#imgFile").click();
  $("#imgFile").onchange = async e => {
    const f = e.target.files[0];
    if (!f) return;
    state.pendingImage = await shrink(f);
    $("#imgPrev").style.backgroundImage = `url('${state.pendingImage}')`;
    toast("התמונה מוכנה, אל תשכחו לשלוח");
  };
  $("#placeForm").onsubmit = async e => {
    e.preventDefault();
    const title = $("#ptitle").value.trim(), text = story.value.trim();
    if (!title) return toast("חסר שם למקום", true);
    if (!text) return toast("ספרו משהו על המקום, גם משפט אחד שווה", true);
    try {
      let imageUrl = mine?.image_url || null;
      if (state.pendingImage) imageUrl = await upload(state.pendingImage);
      const placeId = await rpc("mekomi_upsert_place", { p_participant: store.id, p_title: title, p_story: text, p_image_url: imageUrl });
      store.mine = { id: placeId, title, story: text, image_url: imageUrl };
      store.draft = {}; state.pendingImage = null;
      await refresh(); render();
      toast("הקלף שלך במשחק");
    } catch (err) {
      if (err.message === "game_locked") toast("המשחק כבר נסגר לעריכה", true);
      else toast("אין קליטה כרגע. הטקסט שמור, נסו שוב עוד רגע", true);
    }
  };
}

/* ----- הקלפים ----- */
function renderCards() {
  if (state.phase === "submitting") {
    const missing = Math.max(0, state.participantsCount - state.placesCount);
    $("#screen").innerHTML = `
      <div class="deck-scene">
        <h2>הקלפים עוד הפוכים</h2>
        <div class="deck">
          <div class="cardback"></div>
          <div class="cardback"></div>
          <div class="cardback">${rippleTri(150, "#2882f0", 5)}</div>
        </div>
        <div class="bignum">${state.placesCount}</div>
        <p style="font-weight:600">קלפים כבר במשחק</p>
        <p class="soft" style="margin-top:12px">${state.placesCount > 0 && missing > 0 ? `עוד ${missing} משתתפים באמצע כתיבה.` : ""}
        כשכולם ימלאו, המנחות יחשפו את הקלפים ונתחיל לזהות.</p>
        ${!store.mine ? `<p style="margin-top:16px;font-weight:600;color:var(--advot)">הקלף שלך עוד לא כאן. קדימה, למסך "המקום שלי".</p>` : ""}
      </div>`;
    return;
  }
  const others = state.places.filter(p => !isMine(p));
  const done = state.guesses.length;
  const pct = others.length ? Math.round(done / others.length * 100) : 0;
  const cards = state.places.map((p, i) => {
    const mine = isMine(p);
    const g = state.guesses.find(g => g.place_id === p.id);
    const revealedAuthor = state.phase === "revealed" && p.author_id ? nameOf(p.author_id) : null;
    const tag = revealedAuthor ? `<span class="tag author">${esc(revealedAuthor)}</span>`
      : mine ? `<span class="tag mine">הקלף שלך</span>`
      : g ? `<span class="tag done">✓ ${esc(nameOf(g.guessed_author_id))}</span>`
      : `<span class="tag todo">מי זה?</span>`;
    const media = p.image_url
      ? `<div class="img" style="background-image:url('${esc(p.image_url)}')"></div>`
      : `<div class="blockimg" style="background:${colorFor(p.id)}12">${rippleTri(84, colorFor(p.id), 4)}</div>`;
    return `<button class="gcard" data-place="${p.id}" style="animation-delay:${Math.min(i * 0.05, 0.8)}s">${media}
      <div class="body"><span class="title">${esc(p.title)}</span>${tag}</div></button>`;
  }).join("");
  $("#screen").innerHTML = `
    <div class="head"><h2>הקלפים</h2></div>
    ${state.phase === "guessing" ? `
    <div class="bar-wrap">
      <div class="bar-label"><span>זיהית <b>${done}</b> מתוך <b>${others.length}</b></span><span>${pct}%</span></div>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    </div>` : ""}
    ${state.places.length ? `<div class="grid">${cards}</div>`
      : `<div class="waiting">${rippleTri(80, "#5b6478")}<p class="soft" style="margin-top:10px">עוד אין קלפים במשחק.</p></div>`}
  `;
  document.querySelectorAll(".gcard").forEach(c => c.onclick = () => openPlace(c.dataset.place));
}

function openPlace(placeId) {
  const p = state.places.find(x => x.id === placeId);
  if (!p) return;
  const mine = isMine(p);
  const myGuess = state.guesses.find(g => g.place_id === p.id);
  const canGuess = !mine && state.phase === "guessing";
  const revealedAuthor = state.phase === "revealed" && p.author_id ? nameOf(p.author_id) : null;
  const options = state.participants.filter(x => x.id !== store.id);
  const media = p.image_url
    ? `<div class="hero" style="background-image:url('${esc(p.image_url)}')"></div>`
    : `<div class="hero blockimg" style="background:${colorFor(p.id)}12">${rippleTri(120, colorFor(p.id), 5)}</div>`;
  const ov = $("#overlay");
  ov.innerHTML = `<div class="inner">
    <div class="top"><button class="close-x" id="closeOv">✕ סגירה</button></div>
    ${media}
    <h2>${esc(p.title)}</h2>
    ${revealedAuthor ? `<p class="kicker" style="margin-top:6px">המקום של ${esc(revealedAuthor)}</p>` : ""}
    <p class="story">${esc(p.story)}</p>
    ${mine && !revealedAuthor ? `<p class="hint" style="margin-top:20px">זה הקלף שלך. סקרנים לדעת כמה יזהו אותו.</p>` : ""}
    ${canGuess ? `
      <label style="margin-top:28px">מי לדעתך כתב את זה?</label>
      <p class="hint">מותר ואף רצוי לקום ולשאול אנשים.</p>
      <input type="text" id="gSearch" placeholder="חיפוש שם..." style="margin-top:12px">
      <div class="guess-list" id="gList"></div>` : ""}
    ${!canGuess && !mine && !revealedAuthor && myGuess ? `<p class="hint" style="margin-top:20px">הזיהוי שלך: ${esc(nameOf(myGuess.guessed_author_id))}.</p>` : ""}
  </div>`;
  ov.className = "overlay on";
  ov.scrollTop = 0;
  $("#closeOv").onclick = () => { ov.className = "overlay"; render(); };
  if (canGuess) {
    const list = $("#gList");
    const draw = q => {
      const rows = options.filter(o => !q || o.name.includes(q));
      list.innerHTML = rows.map(o =>
        `<button data-id="${o.id}" class="${myGuess?.guessed_author_id === o.id ? "picked" : ""}">${esc(o.name)}</button>`).join("")
        || `<p class="hint">אין שם כזה ברשימה</p>`;
      list.querySelectorAll("button").forEach(b => b.onclick = async () => {
        try {
          await rpc("mekomi_guess", { p_guesser: store.id, p_place: p.id, p_guessed: b.dataset.id });
          const g = state.guesses.find(g => g.place_id === p.id);
          if (g) g.guessed_author_id = b.dataset.id;
          else state.guesses.push({ place_id: p.id, guessed_author_id: b.dataset.id });
          list.querySelectorAll("button").forEach(x => x.className = "");
          b.className = "picked";
          toast(`נרשם: ${b.textContent}`);
        } catch { toast("אין קליטה כרגע. נסו שוב עוד רגע", true); }
      });
    };
    draw("");
    $("#gSearch").oninput = e => draw(e.target.value.trim());
  }
}

/* ----- החשיפה ----- */
function renderReveal() {
  if (state.phase !== "revealed") {
    $("#screen").innerHTML = `<div class="waiting">
      ${rippleTri(100)}
      <h2 style="margin-top:14px">${state.phase === "guessing" ? "עוד מזהים" : "עוד לא"}</h2>
      <p class="soft" style="margin-top:12px">${state.phase === "guessing"
        ? "חשיפת השמות תגיע בסוף הסמינר, במעמד חגיגי. בינתיים: לקרוא, לזהות, ולדבר עם אנשים."
        : "קודם כולם ממלאים קלף, אחר כך מזהים, ורק בסוף חושפים שמות."}</p>
    </div>`;
    return;
  }
  confetti();
  const correct = state.guesses.filter(g => {
    const p = state.places.find(x => x.id === g.place_id);
    return p && p.author_id === g.guessed_author_id;
  }).length;
  const total = state.places.filter(p => p.author_id !== store.id).length;
  const myPlace = state.places.find(p => p.author_id === store.id);
  const guessedMe = myPlace
    ? state.allGuesses.filter(g => g.place_id === myPlace.id && g.guessed_author_id === store.id).length
    : 0;
  const byGuesser = {};
  state.allGuesses.forEach(g => {
    const p = state.places.find(x => x.id === g.place_id);
    if (p && p.author_id === g.guessed_author_id) byGuesser[g.guesser_id] = (byGuesser[g.guesser_id] || 0) + 1;
  });
  const champ = Object.entries(byGuesser).sort((a, b) => b[1] - a[1])[0];
  const wrongByPlace = {};
  state.allGuesses.forEach(g => {
    const p = state.places.find(x => x.id === g.place_id);
    if (p && p.author_id !== g.guessed_author_id) wrongByPlace[g.place_id] = (wrongByPlace[g.place_id] || 0) + 1;
  });
  const trickiest = Object.entries(wrongByPlace).sort((a, b) => b[1] - a[1])[0];
  const trickyPlace = trickiest ? state.places.find(p => p.id === trickiest[0]) : null;

  $("#screen").innerHTML = `
    <h2>החשיפה 🎉</h2>
    <div class="stat-hero" style="margin-top:16px">
      <div class="big">${correct} מתוך ${total}</div>
      <div style="font-weight:600">מקומות שזיהית נכון</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="n">${guessedMe}</div><div class="t">זיהו את המקום שלך</div></div>
      <div class="stat"><div class="n">${state.places.length}</div><div class="t">קלפים במשחק</div></div>
    </div>
    ${champ ? `<div class="stat wide"><div class="t">🏆 אלוף הזיהויים</div><div class="name">${esc(nameOf(champ[0]))} · ${champ[1] === 1 ? "זיהוי נכון אחד" : champ[1] + " זיהויים נכונים"}</div></div>` : ""}
    ${trickyPlace ? `<div class="stat wide"><div class="t">🎭 הקלף שהכי הרבה טעו בו</div><div class="name">${esc(trickyPlace.title)}</div></div>` : ""}
    <h2 style="font-size:1.35rem;margin:8px 0 14px">כל המקומות והאנשים</h2>
    <div class="grid">${state.places.map((p, i) => {
      const media = p.image_url
        ? `<div class="img" style="background-image:url('${esc(p.image_url)}')"></div>`
        : `<div class="blockimg" style="background:${colorFor(p.id)}12">${rippleTri(84, colorFor(p.id), 4)}</div>`;
      return `<button class="gcard" data-place="${p.id}" style="animation-delay:${Math.min(i * 0.07, 1.4)}s">
        ${media}<div class="body"><span class="title">${esc(p.title)}</span><span class="tag author">${esc(nameOf(p.author_id))}</span></div></button>`;
    }).join("")}</div>`;
  document.querySelectorAll(".gcard").forEach(c => c.onclick = () => openPlace(c.dataset.place));
}

/* ----- מסך המנחות ----- */
const PHASES = [
  { key: "submitting", title: "1 · מילוי", now: "כולם כותבים קלף. הקלפים והשמות עוד חסויים. עקבו למטה מי מילא, ופנו אישית למי שחסר.", btn: "חושפים את הקלפים", btnClass: "advot", confirm: "לחשוף את הקלפים? מרגע זה כולם רואים את המקומות ואת רשימת השמות." },
  { key: "guessing", title: "2 · זיהוי", now: "הקלפים גלויים וכולם מזהים ומדברים. אפשר עדיין להשלים קלפים באיחור. כשמגיע הרגע החגיגי, חושפים שמות.", btn: "חושפים את השמות 🎉", btnClass: "", confirm: "רגע האמת: לחשוף את כל השמות?" },
  { key: "revealed", title: "3 · שמות", now: "השמות גלויים אצל כולם. שווה להקרין את מסך החשיפה במליאה ולשאול: מי גילה משהו מפתיע על מישהו?", btn: null }
];

async function adminRefresh() {
  state.admin.status = await rpc("mekomi_admin_status", { p_pin: state.admin.pin });
  state.admin.places = await rpc("mekomi_admin_places", { p_pin: state.admin.pin });
}

function renderAdmin() {
  const hashPin = location.hash.includes("=") ? location.hash.split("=")[1] : null;
  if (!state.admin && (hashPin || store.adminPin)) {
    const pin = hashPin || store.adminPin;
    state.admin = { pin };
    (async () => {
      try { await adminRefresh(); store.adminPin = pin; renderAdmin(); }
      catch { state.admin = null; if (hashPin) toast("קוד לא נכון", true); renderAdmin(); }
    })();
    $("#app").innerHTML = `<div style="padding-top:30dvh;text-align:center">${rippleTri(96)}</div>`;
    return;
  }
  if (!state.admin) {
    $("#app").innerHTML = `
      <div class="join">
        ${rippleTri(80)}
        <h2 style="margin-top:10px">מסך ניהול</h2>
        <form id="pinForm" class="panel" style="text-align:right">
          <label for="pin">קוד מנחה</label>
          <input type="tel" id="pin" maxlength="8" inputmode="numeric" autocomplete="off">
          <button class="btn" type="submit">כניסה</button>
        </form>
      </div>`;
    $("#pinForm").onsubmit = async e => {
      e.preventDefault();
      try {
        state.admin = { pin: $("#pin").value.trim() };
        await adminRefresh();
        store.adminPin = state.admin.pin;
        renderAdmin();
      } catch { state.admin = null; toast("קוד לא נכון", true); }
    };
    return;
  }
  if (!state.admin.status) return;
  const s = state.admin.status;
  const places = state.admin.places || [];
  const phaseIdx = PHASES.findIndex(p => p.key === s.phase);
  const ph = PHASES[phaseIdx];
  const submitted = s.participants.filter(p => p.submitted);
  const missing = s.participants.filter(p => !p.submitted);
  $("#app").innerHTML = `
    <div class="screen on" style="padding-top:14px">
      <div class="admin-head">${LOGO}
        <div><h2 style="font-size:1.4rem">מקומי · ניהול</h2>
        <span class="soft" style="font-size:0.85rem">לרותם, צופית וניר</span></div>
      </div>
      <div class="phases">
        ${PHASES.map((p, i) => `<div class="phase-pill ${i === phaseIdx ? "now" : i < phaseIdx ? "past" : ""}">${p.title}</div>`).join("")}
      </div>
      <div class="whatnow panel"><b>מה עכשיו:</b> ${ph.now}</div>
      <div class="chips">
        <div class="chip-stat"><div class="n">${s.participants.length}</div><div class="t">נכנסו</div></div>
        <div class="chip-stat"><div class="n">${submitted.length}</div><div class="t">מילאו קלף</div></div>
        <div class="chip-stat"><div class="n">${s.total_guesses}</div><div class="t">זיהויים</div></div>
      </div>
      <div class="admin-actions">
        ${ph.btn ? `<button class="btn ${ph.btnClass}" id="advanceBtn">${ph.btn}</button>` : ""}
        ${phaseIdx > 0 ? `<button class="btn quiet" id="backBtn">חזרה לשלב הקודם</button>` : ""}
      </div>
      ${missing.length && s.phase !== "revealed" ? `
      <div class="missing panel">
        <b>עוד לא מילאו (${missing.length}):</b>
        <div class="names">${missing.map(p => esc(p.name)).join(" · ")}</div>
        <button class="copybtn" id="copyMissing">העתקת הרשימה לפנייה אישית</button>
      </div>` : ""}
      <details class="mod">
        <summary>הצצה לקלפים, לעיניים שלכן בלבד (${places.length})</summary>
        <p class="hint" style="margin-bottom:8px">לבדוק לפני חשיפת הקלפים שאין תמונה או פרט שחושפים מישהו בטעות.</p>
        ${places.map(p => `<div class="modcard">
          <div class="thumb" ${p.image_url ? `style="background-image:url('${esc(p.image_url)}')"` : ""}>${p.image_url ? "" : rippleTri(34, "#2882f0", 3)}</div>
          <div><div class="who">${esc(p.author)}</div><div class="ttl">${esc(p.title)}</div>
          <div class="snip">${esc(p.story.slice(0, 90))}${p.story.length > 90 ? "…" : ""}</div>
          ${s.phase !== "submitting" ? `<div class="snip">זיהו נכון: ${p.right_guesses} · טעו: ${p.wrong_guesses}</div>` : ""}</div>
        </div>`).join("") || `<p class="hint" style="padding-bottom:12px">עוד אין קלפים.</p>`}
      </details>
      <table>
        <tr><th>שם</th><th>קלף</th><th>זיהויים</th><th></th></tr>
        ${s.participants.map(p => `<tr>
          <td>${esc(p.name)}</td>
          <td class="${p.submitted ? "yes" : "no"}">${p.submitted ? "✓" : "✕"}</td>
          <td>${p.guesses}</td>
          <td><button class="del" data-id="${p.id}" data-name="${esc(p.name)}" title="מחיקת משתתף">🗑</button></td></tr>`).join("")}
      </table>
      <p class="autorefresh">הנתונים מתרעננים לבד כל חצי דקה · <a href="#" id="manualRefresh" style="color:var(--blue)">רענון עכשיו</a></p>
    </div>`;
  const doPhase = async (phase, confirmMsg) => {
    if (confirmMsg && !confirm(confirmMsg)) return;
    try {
      await rpc("mekomi_set_phase", { p_pin: state.admin.pin, p_phase: phase });
      await adminRefresh();
      renderAdmin();
      toast("בוצע");
    } catch { toast("משהו השתבש, נסו שוב", true); }
  };
  $("#advanceBtn") && ($("#advanceBtn").onclick = () => doPhase(PHASES[phaseIdx + 1].key, ph.confirm));
  $("#backBtn") && ($("#backBtn").onclick = () => doPhase(PHASES[phaseIdx - 1].key, "לחזור לשלב הקודם?"));
  $("#copyMissing") && ($("#copyMissing").onclick = async () => {
    try {
      await navigator.clipboard.writeText(missing.map(p => p.name).join("\n"));
      toast("הרשימה הועתקה");
    } catch { toast("ההעתקה נכשלה", true); }
  });
  document.querySelectorAll(".del").forEach(b => b.onclick = async () => {
    if (!confirm(`למחוק את ${b.dataset.name}? הקלף והזיהויים שלו יימחקו. מיועד לכפילויות ולניסיונות.`)) return;
    try {
      await rpc("mekomi_admin_delete_participant", { p_pin: state.admin.pin, p_participant: b.dataset.id });
      await adminRefresh();
      renderAdmin();
      toast("נמחק");
    } catch { toast("משהו השתבש, נסו שוב", true); }
  });
  $("#manualRefresh").onclick = async e => {
    e.preventDefault();
    try { await adminRefresh(); renderAdmin(); } catch { toast("אין קליטה כרגע", true); }
  };
  if (!state.adminTimer) {
    state.adminTimer = setInterval(async () => {
      if (!isAdminRoute() || !state.admin) return;
      try { await adminRefresh(); if (document.activeElement.tagName !== "INPUT") renderAdmin(); } catch {}
    }, 30000);
  }
}

/* ===== תמונות ===== */
function shrink(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const max = 1200;
      const k = Math.min(1, max / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * k);
      cv.height = Math.round(img.height * k);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      res(cv.toDataURL("image/jpeg", 0.8));
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

async function upload(dataUrl) {
  const blob = await (await fetch(dataUrl)).blob();
  const name = `${store.id}-${Date.now()}.jpg`;
  const r = await fetch(`${SB_URL}/storage/v1/object/mekomi-images/${name}`, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "image/jpeg" },
    body: blob
  });
  if (!r.ok) throw new Error("upload");
  return `${SB_URL}/storage/v1/object/public/mekomi-images/${name}`;
}

/* ===== אתחול ===== */
window.addEventListener("hashchange", render);
(async function init() {
  $("#app").innerHTML = `<div style="padding-top:30dvh;text-align:center">${rippleTri(96)}</div>`;
  try { await refresh(); } catch {}
  render();
})();
